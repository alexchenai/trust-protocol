name: Deploy to Devnet

on:
  workflow_dispatch:
    inputs:
      initialize:
        description: 'Initialize the protocol after deployment'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  deploy:
    name: Build & Deploy to Devnet
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config build-essential libudev-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.80.0

      - name: Install Solana CLI from GitHub release
        run: |
          cd $HOME
          wget -q https://github.com/solana-labs/solana/releases/download/v1.18.26/solana-release-x86_64-unknown-linux-gnu.tar.bz2
          tar jxf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          echo "$HOME/solana-release/bin" >> $GITHUB_PATH
          export PATH="$HOME/solana-release/bin:$PATH"
          solana --version

      - name: Cache Anchor CLI
        uses: actions/cache@v4
        id: cache-anchor
        with:
          path: ~/.cargo/bin/anchor
          key: anchor-cli-${{ runner.os }}-v0.31.1

      - name: Install Anchor CLI
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v0.31.1 anchor-cli --force

      - name: Verify installations
        run: |
          solana --version
          anchor --version
          rustc --version
          cargo --version

      - name: Setup wallet
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.DEVNET_WALLET_KEY }}' > ~/.config/solana/id.json
          solana config set --url devnet
          echo "Wallet balance:"
          solana balance

      - name: Remove stale Cargo.lock
        run: rm -f Cargo.lock

      - name: Build
        run: anchor build

      - name: List deploy artifacts
        run: ls -la target/deploy/

      - name: Extract and set program ID
        id: program_id
        run: |
          KEYPAIR=$(ls target/deploy/*-keypair.json 2>/dev/null | head -1)
          if [ -z "$KEYPAIR" ]; then
            echo "No keypair found in target/deploy/"
            exit 1
          fi
          echo "Using keypair: $KEYPAIR"
          PROGRAM_ID=$(solana-keygen pubkey "$KEYPAIR")
          echo "program_id=$PROGRAM_ID" >> $GITHUB_OUTPUT
          echo "Program ID: $PROGRAM_ID"
          sed -i "s/declare_id!(\"[^\"]*\")/declare_id!(\"$PROGRAM_ID\")/" programs/trust-protocol/src/lib.rs
          sed -i "s/^trust_protocol = \".*\"/trust_protocol = \"$PROGRAM_ID\"/" Anchor.toml

      - name: Rebuild with correct program ID
        run: anchor build

      - name: Deploy to devnet
        run: |
          echo "Deploying to devnet..."
          solana balance
          anchor deploy --provider.cluster devnet

      - name: Initialize protocol
        if: ${{ github.event.inputs.initialize == 'true' }}
        run: |
          npm ci
          npx ts-node scripts/initialize-protocol.ts
        env:
          ANCHOR_PROVIDER_URL: https://api.devnet.solana.com
          ANCHOR_WALLET: ~/.config/solana/id.json

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Program ID:** \`${{ steps.program_id.outputs.program_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster:** devnet" >> $GITHUB_STEP_SUMMARY
          echo "- **Wallet:** $(solana-keygen pubkey ~/.config/solana/id.json)" >> $GITHUB_STEP_SUMMARY
          echo "- **Balance after deploy:** $(solana balance)" >> $GITHUB_STEP_SUMMARY
