name: Deploy to Devnet

on:
  workflow_dispatch:
    inputs:
      initialize:
        description: 'Initialize the protocol after deployment'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  SOLANA_VERSION: '1.18.26'
  ANCHOR_VERSION: '0.31.2'

jobs:
  deploy:
    name: Build & Deploy to Devnet
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config build-essential libudev-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.80.0

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          solana --version

      - name: Install Anchor CLI via npm
        run: npm i -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Verify installations
        run: |
          echo "PATH=$PATH"
          which solana
          solana --version
          anchor --version
          rustc --version
          cargo --version

      - name: Setup wallet
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.DEVNET_WALLET_KEY }}' > ~/.config/solana/id.json
          solana config set --url devnet
          echo "Wallet balance:"
          solana balance

      - name: Remove stale Cargo.lock
        run: rm -f Cargo.lock

      - name: Generate fresh lockfile
        run: cargo generate-lockfile

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Build
        run: anchor build

      - name: Extract and set program ID
        id: program_id
        run: |
          PROGRAM_ID=$(solana-keygen pubkey target/deploy/trust_protocol-keypair.json)
          echo "program_id=$PROGRAM_ID" >> $GITHUB_OUTPUT
          echo "Program ID: $PROGRAM_ID"
          sed -i "s/declare_id!(\"[^\"]*\")/declare_id!(\"$PROGRAM_ID\")/" programs/trust-protocol/src/lib.rs
          sed -i "s/^trust_protocol = \".*\"/trust_protocol = \"$PROGRAM_ID\"/" Anchor.toml
          sed -i "s/trust-protocol = \".*\"/trust-protocol = \"$PROGRAM_ID\"/" Anchor.toml

      - name: Rebuild with correct program ID
        run: |
          rm -f Cargo.lock
          cargo generate-lockfile
          anchor build

      - name: Deploy to devnet
        run: |
          echo "Deploying to devnet..."
          solana balance
          anchor deploy --provider.cluster devnet

      - name: Initialize protocol
        if: ${{ github.event.inputs.initialize == 'true' }}
        run: |
          npm ci
          npx ts-node scripts/initialize-protocol.ts
        env:
          ANCHOR_PROVIDER_URL: https://api.devnet.solana.com
          ANCHOR_WALLET: ~/.config/solana/id.json

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Program ID:** \`${{ steps.program_id.outputs.program_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster:** devnet" >> $GITHUB_STEP_SUMMARY
          echo "- **Wallet:** $(solana-keygen pubkey ~/.config/solana/id.json)" >> $GITHUB_STEP_SUMMARY
          echo "- **Balance after deploy:** $(solana balance)" >> $GITHUB_STEP_SUMMARY
